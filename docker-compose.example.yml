services:
  unclaimed-orders-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: unclaimed-orders-service
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - unclaimed-orders-data:/data

volumes:
  unclaimed-orders-data:
